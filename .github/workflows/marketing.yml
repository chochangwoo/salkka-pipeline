# .github/workflows/marketing.yml
#
# 살까말까 마케팅 에셋 배포 워크플로우
#
# 마케팅 에셋 생성은 main.py STEP 4.5에서 자동 처리됨
# 이 워크플로우는 GitHub Pages 배포 + 에셋 보존 전용

name: Marketing Deploy

on:
  workflow_run:
    workflows: ["살까말까 주간 자동 발송"]
    types: [completed]

  workflow_dispatch:

jobs:
  deploy-archive:
    name: SEO 아카이브 배포
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이프라인 아티팩트 다운로드
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: weekly.yml
          name: newsletter-data
          path: data/
        continue-on-error: true

      - name: 마케팅 에셋 확인
        run: |
          echo "=== 생성된 마케팅 에셋 ==="
          ls -lh data/cards/ 2>/dev/null || echo "카드뉴스 없음"
          ls -lh data/posts/ 2>/dev/null || echo "게시글 없음"
          ls -lh data/archive/ 2>/dev/null || echo "아카이브 없음"

      - name: gh-pages 배포 준비
        run: |
          mkdir -p docs/archive
          cp -f data/archive/*.html docs/archive/ 2>/dev/null || true
          if [ ! -f docs/index.html ]; then
            cat > docs/index.html << 'EOHTML'
          <!DOCTYPE html>
          <html lang="ko">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=https://salkkamalka.com">
            <title>살까말까</title>
          </head>
          <body><a href="https://salkkamalka.com">살까말까로 이동</a></body>
          </html>
          EOHTML
          fi

      - name: GitHub Pages 배포
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true
        continue-on-error: true

      - name: 마케팅 에셋 보존
        uses: actions/upload-artifact@v4
        with:
          name: marketing-assets
          path: |
            data/cards/
            data/archive/
            data/posts/
          retention-days: 30
        continue-on-error: true
